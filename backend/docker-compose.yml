# docker-compose.yml — LabWatch API (local development)
#
# docker compose up --build   → build and start
# docker compose up -d        → start in background
# docker compose logs -f      → tail logs
# docker compose down         → stop and remove

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: auxcon/labwatch-api:dev
    container_name: labwatch-api

    # host networking required: ping checks target 192.168.2.x devices on the
    # physical LAN. Bridge networking (Docker default) isolates the container
    # from the host network, making those addresses unreachable.
    # Tradeoff: container loses network namespace isolation. Acceptable for a
    # single-tenant home lab monitoring deployment.
    # Note: ports mapping is ignored on Linux when network_mode is host.
    network_mode: host

    environment:
      - FLASK_ENV=production
      - GUNICORN_WORKERS=3
      - LOG_LEVEL=INFO

    restart: unless-stopped

    cap_add:
      - NET_RAW

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
