<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabWatch — Auxcon Technologies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c10;
    --bg2:       #0d1117;
    --bg3:       #111820;
    --border:    #1e2d3d;
    --border2:   #243447;
    --green:     #00ff88;
    --green-dim: #00cc6a;
    --green-bg:  rgba(0,255,136,0.06);
    --red:       #ff3b3b;
    --red-dim:   #cc2f2f;
    --red-bg:    rgba(255,59,59,0.06);
    --blue:      #3b82f6;
    --blue-dim:  #2563eb;
    --amber:     #f59e0b;
    --text:      #c9d8e8;
    --text-dim:  #5a7a9a;
    --text-faint:#2a3d52;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow', sans-serif;
    --cond:      'Barlow Condensed', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border: 2px solid var(--green);
    display: grid;
    place-items: center;
    position: relative;
  }

  .logo-mark::after {
    content: '';
    width: 10px;
    height: 10px;
    background: var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .logo-text {
    font-family: var(--cond);
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
  }

  .logo-text span {
    color: var(--green);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .tag.live {
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .tag.live::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.4s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Main layout */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
  }

  /* Header row */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .header-title {
    font-family: var(--cond);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }

  .header-time {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  /* Summary strip */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-bottom: 2rem;
    border: 1px solid var(--border);
  }

  .summary-cell {
    background: var(--bg2);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .summary-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .summary-number {
    font-family: var(--cond);
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .summary-number.total { color: var(--blue); }
  .summary-number.up    { color: var(--green); }
  .summary-number.down  { color: var(--red); }

  /* Section header */
  .section-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Service cards */
  .services {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .card {
    background: var(--bg2);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    position: relative;
    overflow: hidden;
    transition: background 0.15s;
  }

  .card:hover { background: var(--bg3); }

  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
  }

  .card.up::before   { background: var(--green); }
  .card.down::before { background: var(--red); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-name {
    font-family: var(--cond);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #fff;
  }

  .status-badge {
    font-family: var(--mono);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 0.2rem 0.55rem;
    border: 1px solid;
  }

  .status-badge.up {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-bg);
  }

  .status-badge.down {
    color: var(--red);
    border-color: var(--red);
    background: var(--red-bg);
  }

  .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem 1rem;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .meta-label {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .meta-value {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  .meta-value.highlight { color: var(--amber); }

  /* Response bar */
  .response-bar-wrap {
    height: 2px;
    background: var(--border);
    overflow: hidden;
  }

  .response-bar {
    height: 100%;
    background: var(--green-dim);
    transition: width 0.6s ease;
  }

  .card.down .response-bar { background: var(--red-dim); width: 0 !important; }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .footer-text {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border2);
    padding: 0.4rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .refresh-btn:hover {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-bg);
  }

  /* Loading / error states */
  .state-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 1rem;
    text-align: center;
  }

  .state-label {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .state-label.loading { color: var(--blue); }
  .state-label.error   { color: var(--red); }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stagger-in animation */
  .card {
    opacity: 0;
    transform: translateY(8px);
    animation: card-in 0.3s ease forwards;
  }

  @keyframes card-in {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <div class="logo-mark"></div>
    <span class="logo-text">Lab<span>Watch</span></span>
  </div>
  <div class="topbar-right">
    <span class="tag">Auxcon Technologies</span>
    <span class="tag live" id="live-tag">Live</span>
  </div>
</nav>

<main class="main">

  <div class="header">
    <div>
      <div class="header-title">Network Status Dashboard</div>
      <div class="header-time" id="last-updated">—</div>
    </div>
  </div>

  <div id="app">
    <div class="state-screen">
      <div class="spinner"></div>
      <span class="state-label loading">Polling services...</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">auxcon.dev &nbsp;/&nbsp; api.auxcon.dev</span>
    <button class="refresh-btn" onclick="fetchStatus()">Refresh</button>
  </div>

</main>

<script>
  const API = '/status';
  let maxResponseTime = 1000;

  function formatTime(d) {
    return d.toLocaleTimeString('en-GB', { hour12: false }) + ' UTC+0';
  }

  function typeLabel(type) {
    return type === 'http' ? 'HTTP' : 'ICMP';
  }

  function renderCard(svc, index) {
    const isUp = svc.status === 'up';
    const ms = svc.response_time_ms;
    const barWidth = (ms && isUp)
      ? Math.min(100, Math.round((ms / maxResponseTime) * 100))
      : 0;

    return `
      <div class="card ${isUp ? 'up' : 'down'}"
           style="animation-delay: ${index * 0.05}s">
        <div class="card-header">
          <span class="card-name">${svc.name}</span>
          <span class="status-badge ${isUp ? 'up' : 'down'}">
            ${isUp ? 'ONLINE' : 'OFFLINE'}
          </span>
        </div>
        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-label">Type</span>
            <span class="meta-value">${typeLabel(svc.type)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Response</span>
            <span class="meta-value ${ms && ms > 500 ? 'highlight' : ''}">
              ${ms !== null ? ms + ' ms' : '—'}
            </span>
          </div>
          <div class="meta-item">
            <span class="meta-label">HTTP Status</span>
            <span class="meta-value">
              ${svc.status_code !== null ? svc.status_code : '—'}
            </span>
          </div>
        </div>
        <div class="response-bar-wrap">
          <div class="response-bar" style="width: ${barWidth}%"></div>
        </div>
      </div>`;
  }

  function render(data) {
    const times = data.results
      .map(s => s.response_time_ms)
      .filter(Boolean);
    if (times.length) maxResponseTime = Math.max(...times, 500);

    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="summary">
        <div class="summary-cell">
          <span class="summary-label">Total Services</span>
          <span class="summary-number total">${String(data.total).padStart(2,'0')}</span>
        </div>
        <div class="summary-cell">
          <span class="summary-label">Online</span>
          <span class="summary-number up">${String(data.up).padStart(2,'0')}</span>
        </div>
        <div class="summary-cell">
          <span class="summary-label">Offline</span>
          <span class="summary-number down">${String(data.down).padStart(2,'0')}</span>
        </div>
      </div>
      <div class="section-label">Service Status</div>
      <div class="services">
        ${data.results.map((s, i) => renderCard(s, i)).join('')}
      </div>`;

    document.getElementById('last-updated').textContent =
      'Last updated: ' + formatTime(new Date());
  }

  function renderError(msg) {
    document.getElementById('app').innerHTML = `
      <div class="state-screen">
        <span class="state-label error">Connection Failed</span>
        <span class="tag">${msg}</span>
      </div>`;
  }

  async function fetchStatus() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      render(await res.json());
    } catch (e) {
      renderError(e.message);
    }
  }

  fetchStatus();
  setInterval(fetchStatus, 30000);
</script>
</body>
</html>
