<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabWatch - Auxcon Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design system tokens (mirrors constants/theme.ts) ── */
    :root {
      --bg:               #0A0C10;
      --surface:          #141820;
      --surface-raised:   #1C2330;
      --accent:           #00D4FF;
      --accent-dim:       rgba(0, 212, 255, 0.12);
      --accent-glow:      rgba(0, 212, 255, 0.25);
      --status-up:        #00C48C;
      --status-up-dim:    rgba(0, 196, 140, 0.12);
      --status-degraded:  #FFB020;
      --status-down:      #FF4D4D;
      --text-primary:     #F0F4F8;
      --text-secondary:   #8892A4;
      --text-tertiary:    #4A5568;
      --border:           rgba(255, 255, 255, 0.06);
      --border-strong:    rgba(255, 255, 255, 0.10);
      --radius:           8px;
      --radius-lg:        12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Grid noise background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top accent bar ── */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 100;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    /* ────────────────────────────────────────
       Header
    ──────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wordmark-icon {
      width: 32px;
      height: 32px;
      border: 2px solid var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .wordmark-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
    }

    .wordmark-icon-inner {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 2px;
      position: relative;
      z-index: 1;
    }

    .wordmark-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .company-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--status-up);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--status-up);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    /* ────────────────────────────────────────
       Summary strip
    ──────────────────────────────────────── */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .summary-card:hover::before { opacity: 1; }
    .summary-card:hover { border-color: var(--border-strong); }

    .summary-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .summary-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .summary-value.total  { color: var(--accent); }
    .summary-value.online { color: var(--status-up); }
    .summary-value.offline { color: var(--status-down); }

    /* ────────────────────────────────────────
       Section header
    ──────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .last-updated {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    /* ────────────────────────────────────────
       Service grid
    ──────────────────────────────────────── */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      animation: card-in 0.4s ease both;
    }

    .service-card:hover {
      background: var(--surface-raised);
      transform: translateY(-1px);
    }

    .service-card.up {
      border-left-color: var(--status-up);
    }

    .service-card.degraded {
      border-left-color: var(--status-degraded);
    }

    .service-card.down {
      border-left-color: var(--status-down);
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .service-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-badge.up {
      background: var(--status-up-dim);
      color: var(--status-up);
    }

    .status-badge.degraded {
      background: rgba(255, 176, 32, 0.12);
      color: var(--status-degraded);
    }

    .status-badge.down {
      background: rgba(255, 77, 77, 0.12);
      color: var(--status-down);
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge-dot.up { animation: pulse 2s ease-in-out infinite; }

    /* ── Metrics ── */
    .metrics {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .metric-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .metric-key {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
    }

    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .metric-value.accent { color: var(--accent); }

    /* ── Response bar ── */
    .response-bar-track {
      margin-top: 16px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .response-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .response-bar-fill.up        { background: var(--status-up); }
    .response-bar-fill.degraded  { background: var(--status-degraded); }
    .response-bar-fill.down      { background: var(--status-down); width: 100% !important; }

    /* ────────────────────────────────────────
       Footer
    ──────────────────────────────────────── */
    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    .footer-link:hover { color: var(--accent); }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 9px 16px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .refresh-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
    }

    /* ────────────────────────────────────────
       Loading / error states
    ──────────────────────────────────────── */
    .state-message {
      text-align: center;
      padding: 64px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
    }

    .state-message.error { color: var(--status-down); }

    /* ────────────────────────────────────────
       Responsive
    ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .summary-strip { grid-template-columns: 1fr; }
      .service-grid  { grid-template-columns: 1fr; }
      .header-right  { gap: 12px; }
      .company-name  { display: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── Header ── -->
  <header>
    <div class="wordmark">
      <div class="wordmark-icon">
        <div class="wordmark-icon-inner"></div>
      </div>
      <span class="wordmark-text">LABWATCH</span>
    </div>
    <div class="header-right">
      <span class="company-name">Auxcon Technologies</span>
      <div class="live-badge" id="live-badge" style="visibility:hidden;">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>
  </header>

  <!-- ── Summary strip ── -->
  <div class="summary-strip">
    <div class="summary-card">
      <div class="summary-label">Total Services</div>
      <div class="summary-value total" id="stat-total">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Online</div>
      <div class="summary-value online" id="stat-up">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Offline</div>
      <div class="summary-value offline" id="stat-down">--</div>
    </div>
  </div>

  <!-- ── Service list ── -->
  <div class="section-header">
    <span class="section-label">Service Status</span>
    <span class="last-updated" id="last-updated"></span>
  </div>

  <div class="service-grid" id="service-grid">
    <div class="state-message" id="loading-msg">Loading...</div>
  </div>

  <!-- ── Footer ── -->
  <footer>
    <div class="footer-links">
      <a class="footer-link" href="https://api.auxcon.dev/status">/status</a>
      <a class="footer-link" href="https://auxcon.dev">auxcon.dev</a>
    </div>
    <button class="refresh-btn" onclick="fetchStatus()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Refresh
    </button>
  </footer>

</div>

<script>
  // ── Helpers ──────────────────────────────────────────────
  const pad = n => String(n).padStart(2, '0');

  function statusClass(s) {
    if (!s) return 'down';
    const v = s.toLowerCase();
    if (v === 'up') return 'up';
    if (v === 'degraded') return 'degraded';
    return 'down';
  }

  function statusLabel(s) {
    if (!s) return 'DOWN';
    const v = s.toLowerCase();
    if (v === 'up') return 'ONLINE';
    if (v === 'degraded') return 'DEGRADED';
    return 'OFFLINE';
  }

  // Response time bar: 0ms -> 0%, 500ms -> 100%, capped
  function barWidth(ms) {
    if (ms == null || ms < 0) return 100;
    return Math.min(100, Math.round((ms / 500) * 100));
  }

  function formatTime() {
    const now = new Date();
    return `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())} UTC`;
  }

  // ── Render ──────────────────────────────────────────────
  function renderCards(services) {
    const grid = document.getElementById('service-grid');
    if (!services || services.length === 0) {
      grid.innerHTML = '<div class="state-message">No services configured.</div>';
      return;
    }

    grid.innerHTML = services.map((svc, i) => {
      const cls   = statusClass(svc.status);
      const label = statusLabel(svc.status);
      const ms    = svc.response_time_ms;
      const bw    = barWidth(ms);
      const responseText = (ms != null && ms >= 0) ? `${ms} ms` : 'N/A';
      const httpText = svc.status_code ? String(svc.status_code) : '--';
      const delay = (i * 60) + 'ms';

      return `
        <div class="service-card ${cls}" style="animation-delay:${delay}">
          <div class="card-header">
            <span class="service-name">${escHtml(svc.name)}</span>
            <div class="status-badge ${cls}">
              <div class="badge-dot ${cls}"></div>
              ${label}
            </div>
          </div>
          <div class="metrics">
            <div class="metric-row">
              <span class="metric-key">type</span>
              <span class="metric-value accent">${escHtml((svc.type || 'HTTP').toUpperCase())}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">response</span>
              <span class="metric-value">${responseText}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">http_status</span>
              <span class="metric-value">${httpText}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">target</span>
              <span class="metric-value" style="font-size:10px;color:var(--text-secondary);word-break:break-all;">${escHtml(svc.target || svc.url || '--')}</span>
            </div>
          </div>
          <div class="response-bar-track">
            <div class="response-bar-fill ${cls}" style="width:${bw}%"></div>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Fetch ───────────────────────────────────────────────
  async function fetchStatus() {
    const grid = document.getElementById('service-grid');

    try {
      const res  = await fetch('/status');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const services = data.results ?? data.services ?? [];
      const up       = data.up   ?? services.filter(s => s.status === 'up').length;
      const down     = data.down ?? services.filter(s => s.status !== 'up').length;
      const total    = data.total ?? services.length;

      document.getElementById('stat-total').textContent = pad(total);
      document.getElementById('stat-up').textContent    = pad(up);
      document.getElementById('stat-down').textContent  = pad(down);
      document.getElementById('last-updated').textContent = `Updated ${formatTime()}`;
      document.getElementById('live-badge').style.visibility = 'visible';

      renderCards(services);
    } catch (err) {
      grid.innerHTML = `<div class="state-message error">Failed to fetch status: ${escHtml(err.message)}</div>`;
    }
  }

  // ── Init ────────────────────────────────────────────────
  fetchStatus();
  setInterval(fetchStatus, 30000);   // Poll every 30s -- matches app polling interval
</script>
</body>
</html>
