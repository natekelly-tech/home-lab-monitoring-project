# NOTE: Traefik is disabled on this cluster (--disable traefik).
# Cloudflare Tunnel handles external ingress at the edge.
# This manifest is retained for documentation and future use.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: labwatch-ingress
  namespace: default
spec:
  ingressClassName: traefik
  rules:
    - host: api.auxcon.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: labwatch-api-svc
                port:
                  number: 8080
